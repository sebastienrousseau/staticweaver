# Release pipeline. Fires on annotated `v*.*.*` tags and delegates to the
# reusable workflow in `sebastienrousseau/pipelines`, which handles build,
# SBOM, checksums, GitHub Release creation, and `cargo publish`.
#
# Before pushing a tag:
#   1. Update the `version` field in Cargo.toml and land it on `main`.
#   2. `git tag -s vX.Y.Z -m "release X.Y.Z"` then `git push --tags`.

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Build and validate, but do not publish or create a release"
        default: true
        type: boolean

# Default to no permissions; per-job blocks below grant the
# minimum each job needs (verify + publish are both contents:
# read — cargo publish authenticates via CARGO_REGISTRY_TOKEN,
# not the GitHub Actions token).
permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Cross-platform sanity check before publishing. Library crates don't
  # ship per-OS binaries, but a Linux-only release has historically hidden
  # platform-specific regressions (path separators, TLS backends, …) that
  # only surface when a consumer builds on macOS/Windows. Runs the same
  # `cargo test --all-features` our CI runs, on all three host OSes.
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-verify-${{ matrix.os }}
          save-if: false
      - run: cargo test --all-features
        shell: bash

  # Direct publish step. We previously delegated this to the reusable
  # workflow at `sebastienrousseau/pipelines/.github/workflows/release.yml`,
  # but that workflow downloads the per-target build artifact + SBOM
  # into the working tree before invoking `cargo publish`, which then
  # refuses to proceed ("files in the working directory contain
  # changes that were not yet committed into git"). Until the reusable
  # workflow fixes that ordering, we do the publish here directly —
  # `staticweaver` is a library crate, so we don't need the SBOM /
  # tarball / Sigstore-attestation steps the reusable workflow adds.
  publish:
    name: Publish to crates.io
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry-run) }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: cargo publish
