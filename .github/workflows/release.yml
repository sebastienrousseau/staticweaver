# Release pipeline. Fires on annotated `v*.*.*` tags and delegates to the
# reusable workflow in `sebastienrousseau/pipelines`, which handles build,
# SBOM, checksums, GitHub Release creation, and `cargo publish`.
#
# Before pushing a tag:
#   1. Update the `version` field in Cargo.toml and land it on `main`.
#   2. `git tag -s vX.Y.Z -m "release X.Y.Z"` then `git push --tags`.

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Build and validate, but do not publish or create a release"
        default: true
        type: boolean

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: sebastienrousseau/pipelines/.github/workflows/release.yml@99a39f7d02e76beb2b935fa07b7cd6a46d8bbc65
    with:
      language: rust
      dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run || false }}
      # `staticweaver` is a library crate — the tarballs produced by the
      # per-target build are not consumer-facing artifacts (consumers pick
      # the crate up from crates.io). A single Linux target keeps the
      # release pipeline lean while still exercising the build.
      rust-targets: >-
        [
          {"target":"x86_64-unknown-linux-gnu","os":"ubuntu-latest"}
        ]
    secrets:
      CRATES_TOKEN: ${{ secrets.CARGO_API_TOKEN }}
