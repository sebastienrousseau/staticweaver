# Publish rustdoc to GitHub Pages at https://doc.staticweaver.com/.
#
# Builds the crate's API docs with the same strict flags as CI, adds a
# root-level redirect into `staticweaver/index.html` (cargo doc only emits
# `<crate>/index.html`, never a top-level one), writes the custom-domain
# CNAME, and deploys via `actions/deploy-pages`.
#
# One-time setup outside this file:
#   1. Repo Settings → Pages → Source: "GitHub Actions".
#   2. DNS: CNAME `doc.staticweaver.com` → `sebastienrousseau.github.io`.
#      Wait for DNS check ✓ in the Pages settings before enabling
#      "Enforce HTTPS".

name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# No write scope by default; the deploy job opts into pages:write +
# id-token:write (required by actions/deploy-pages OIDC) explicitly.
permissions: {}

# Serialize Pages deploys — GitHub only allows one in-flight deployment
# per environment, and `cancel-in-progress: false` lets queued runs finish
# instead of being dropped.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build rustdoc
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build docs (all features, strict)
        env:
          RUSTDOCFLAGS: "-D warnings -D rustdoc::broken_intra_doc_links -D rustdoc::private_intra_doc_links"
        run: cargo doc --no-deps --all-features

      - name: Stage Pages artifact
        run: |
          set -euo pipefail
          # Redirect the apex (https://doc.staticweaver.com/) to the crate's
          # rustdoc landing page.
          printf '<!doctype html><meta http-equiv="refresh" content="0; url=staticweaver/index.html">\n' \
            > target/doc/index.html
          # Custom-domain marker — required on every deploy because the
          # Pages action publishes the artifact verbatim.
          printf 'doc.staticweaver.com\n' > target/doc/CNAME
          # Disable Jekyll: rustdoc emits asset directories that begin with
          # an underscore, which Jekyll would otherwise strip.
          touch target/doc/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
