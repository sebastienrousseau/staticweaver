# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/
#
# Run locally with: `cargo deny check`
# CI enforces the same policy via the reusable `security.yml` workflow.

[licenses]
# OSI-approved permissive licenses actually appearing in the dep tree.
# Anything outside this set fails CI until explicitly reviewed.
# Includes every OSI-approved license appearing in the lockfile under any
# feature configuration. The `BSD-*`, `ISC`, `CC0-1.0`, and `Unicode-3.0`
# entries only activate under `--features remote-templates` (reqwest's
# dep tree); cargo-deny warns they are "unmatched" under the default
# resolution — the warnings are cosmetic, the check passes.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
]

[advisories]
# Treat yanked crates as errors — they indicate an upstream withdrawal
# and should be bumped, not carried in the lockfile.
yanked = "deny"
ignore = []

[bans]
multiple-versions = "warn"
highlight = "all"
# `commons` brings thiserror 1.x while we use 2.x directly; allow the dup
# until commons bumps. Track: github.com/sebastienrousseau/commons
skip = [
    { crate = "thiserror@1", reason = "pulled transitively by commons v0.0.1" },
    { crate = "thiserror-impl@1", reason = "pulled transitively by commons v0.0.1" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "allow"
# `commons` is a first-party crate hosted on GitHub.
allow-git = ["https://github.com/sebastienrousseau/commons"]
