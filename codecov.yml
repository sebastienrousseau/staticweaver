# Codecov configuration for staticweaver.
#
# Local llvm-cov reports >99% line coverage; the Codecov *patch*
# check measures coverage on the diff vs main, which by default
# uses the base file's coverage as the target and fails if a PR
# drops below it. We set explicit, honest thresholds so the
# project doesn't fail on internally-consistent contributions.
#
# Source of truth for the >=98% gate is the `coverage-gate` job in
# `.github/workflows/ci.yml`, which fails the build if total line
# coverage drops below 98%. This file only configures the GitHub
# status checks Codecov posts.

coverage:
  precision: 2
  round: down
  range: "95...100"
  status:
    project:
      default:
        # Total project coverage must stay at or above this floor.
        # Matches the in-repo coverage-gate CI job.
        target: 98%
        # Allow up to 0.5pp drift before flagging — protects
        # against single-line variance in defensive arms.
        threshold: 0.5%
    patch:
      default:
        # Coverage of *changed lines only*. We aim for 90%+ on every
        # patch but accept some defensive-arm slack — feature-gated
        # code paths and unreachable error-handling branches inflate
        # the denominator without representing real testability gaps.
        target: 90%
        threshold: 1%

# Ignore generated / non-production paths from coverage entirely.
ignore:
  - "benches/**/*"
  - "examples/**/*"
  - "tests/**/*"

comment:
  layout: "diff, flags, files"
  behavior: default
  require_changes: false
